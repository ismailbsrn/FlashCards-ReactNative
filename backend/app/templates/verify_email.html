<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — FlashCards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #030014;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Background glows */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
        }
        body::before {
            width: 400px; height: 400px;
            background: rgba(109, 40, 217, 0.18);
            top: -100px; left: -100px;
        }
        body::after {
            width: 300px; height: 300px;
            background: rgba(79, 70, 229, 0.12);
            bottom: -80px; right: -60px;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            max-width: 420px;
            width: 100%;
            padding: 40px 36px;
            text-align: center;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(12px);
        }

        .icon {
            width: 88px; height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 40px;
        }
        .icon.loading { background: rgba(139, 92, 246, 0.12); border: 1.5px solid rgba(139, 92, 246, 0.35); }
        .icon.success { background: rgba(34, 197, 94, 0.12); border: 1.5px solid rgba(34, 197, 94, 0.35); }
        .icon.error   { background: rgba(239, 68, 68, 0.12);  border: 1.5px solid rgba(239, 68, 68, 0.35); }

        h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.4px;
            margin-bottom: 12px;
        }

        p {
            color: #9CA3AF;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
            padding: 14px 32px;
            background: #7C3AED;
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: #8B5CF6;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hint {
            margin-top: 20px;
            color: #4B5563;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <!-- Populated by JS -->
        <div class="icon loading" id="icon">
            <div class="spinner"></div>
        </div>
        <h1 id="title">Verifying…</h1>
        <p id="body">Please wait while we verify your email address.</p>
    </div>

    <script>
        const APP_SCHEME = '{{ app_scheme }}';
        const token = '{{ token }}';

        async function verify() {
            const icon  = document.getElementById('icon');
            const title = document.getElementById('title');
            const body  = document.getElementById('body');
            const card  = document.getElementById('card');

            try {
                const res = await fetch(`/api/auth/verify-email?token=${encodeURIComponent(token)}`, {
                    headers: { 'Accept': 'application/json' }
                });
                const data = await res.json();

                if (res.ok || data.message === 'Email already verified') {
                    icon.className = 'icon success';
                    icon.textContent = '✓';
                    title.textContent = 'Email verified!';
                    body.innerHTML = 'Your email address has been confirmed.<br>You can now sign in to FlashCards.';

                    const btn = document.createElement('a');
                    btn.href = APP_SCHEME + '://';
                    btn.className = 'btn';
                    btn.textContent = '🃏  Open FlashCards';
                    card.appendChild(btn);

                    const hint = document.createElement('p');
                    hint.className = 'hint';
                    hint.textContent = "If the app doesn't open, tap 'I've verified my email' inside the app.";
                    card.appendChild(hint);
                } else {
                    showError(data.detail || 'Verification failed.');
                }
            } catch (e) {
                showError('Could not reach the server. Make sure you are on the same network as the backend.');
            }
        }

        function showError(msg) {
            const icon  = document.getElementById('icon');
            const title = document.getElementById('title');
            const body  = document.getElementById('body');
            const card  = document.getElementById('card');

            icon.className = 'icon error';
            icon.textContent = '✕';
            title.textContent = 'Verification failed';
            body.textContent = msg;

            const btn = document.createElement('a');
            btn.href = APP_SCHEME + '://';
            btn.className = 'btn';
            btn.style.background = '#6B7280';
            btn.style.boxShadow = 'none';
            btn.textContent = 'Back to app';
            card.appendChild(btn);
        }

        verify();
    </script>
</body>
</html>
